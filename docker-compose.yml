services:

  get_data:  
    build:
      context: .
      dockerfile: docker/python/.
    image: python_custom
    container_name: get_data
    volumes:
    - ./:/app
    command: > 
      uv run python ingestion/get_data.py

  pytest:
    build:
      context: .
      dockerfile: docker/python/.
    image: python_custom
    container_name: pytest
    volumes:
      - ./:/app
    command: >
      uv run pytest

